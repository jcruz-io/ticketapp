services:
  db:
    image: postgres:16-bookworm
    container_name: ticketapp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticketapp}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
      POSTGRES_DB: ${POSTGRES_DB:-ticketapp}
    ports:
      - "5432:5432"
    secrets:
      - postgres-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketapp} -d ${POSTGRES_DB:-ticketapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: ticketapp_backend
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-ticketapp}
      POSTGRES_DB: ${POSTGRES_DB:-ticketapp}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
    ports:
      - "8000:8000"
    secrets:
      - postgres-password
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

secrets:
    postgres-password:
        file: ./secrets/POSTGRES_PASSWORD

